name: C++ CI

on:
  push:
    paths:
      - "sysmodule/**"
      - "overlay/**"
      - "docker/Dockerfile.test-cpp"
      - ".github/workflows/cpp-ci.yml"
  pull_request:
    paths:
      - "sysmodule/**"
      - "overlay/**"
      - "docker/Dockerfile.test-cpp"
      - ".github/workflows/cpp-ci.yml"

jobs:
  test-cpp:
    name: C++ tests (sysmodule + overlay, 100% diff-cover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - name: Build test image
        run: docker compose build test-sysmodule

      - name: Run sysmodule + overlay tests + diff-cover
        run: docker compose run --rm test-sysmodule
