name: Feature Request
description: Suggest a new capability or improvement
labels: ["feature"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Sysmodule (background service)
        - Overlay (Ultrahand UI)
        - Both / unsure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before filing this
          required: true
