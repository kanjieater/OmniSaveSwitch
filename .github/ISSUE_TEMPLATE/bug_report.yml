name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Safety first:** If this bug causes save data loss or corruption, add the `p0` label after submitting.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Sysmodule (background service)
        - Overlay (Ultrahand UI)
        - Both
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "p2 — UI glitch / minor issue"
        - "p1 — Crash or system instability"
        - "p0 — Save data loss or corruption"
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Switch firmware version
      placeholder: "e.g. 18.1.0"
    validations:
      required: true

  - type: input
    id: omnisave-version
    attributes:
      label: OmniSave version
      placeholder: "e.g. v1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include steps to reproduce.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or crash output
      description: Paste any relevant log output (crash report, sysmodule log, etc.)
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before filing this
          required: true
        - label: This is not a security vulnerability (if it is, open an issue with the `security` label)
          required: true
