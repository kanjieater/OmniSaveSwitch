# OmniSave Configuration
# server_address=https://your-server.example.com
server_address=
# device_token=sk_device_...  (generate in OmniSave web UI after first sync)
device_token=
# nickname=My Switch  (bootstrap hint; server auto-labels on first registration)
nickname=
# verbose_notifications=0  (1 = also show conflict/sweep events)
verbose_notifications=0
# verify_tls=0  (set 0 if using a self-signed cert with https)
# device_suffix=  (optional; append to device ID to distinguish SysNAND from EmuNAND)
# Example for EmuNAND: device_suffix=emu
device_suffix=
